name: Build AppImage (Qt 6.10.2)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # Ubuntu 22.04 is recommended for modern Qt 6.x
    runs-on: ubuntu-22.04 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # libfuse2 is for the AppImage tool
          # libxcb-cursor0 and libxkbcommon are mandatory for Qt6 apps
          sudo apt-get install -y libfuse2 libglu1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0

      - name: Install Qt 6.10.2
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.10.2'
          # Host is usually determined automatically, but ensures Linux
          host: 'linux'
          target: 'desktop'

      - name: Build Application
        run: |
          qmake .
          make -j$(nproc)
          
          # Create folder using standard relative paths
          mkdir -p FinalBuild/Desktop-Release
          
          # Copy your 'bin' folder (with the binary inside)
          cp -r bin FinalBuild/Desktop-Release/
          
          # Verify files exist in the runner's workspace
          ls -R FinalBuild/Desktop-Release

      - name: Qt to AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        uses: Kidev/Qt-AppImage@v1
        with:
          # Use a relative path! The Docker container will find it.
          install_folder: 'FinalBuild/Desktop-Release'
          
          app_name: 'SpaceTimeHeart'
          binary: 'SpaceTimeHeart'  # Ensure this is passed
          comment: 'Note-Taking-App'
          category: 'Utility'
