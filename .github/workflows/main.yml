name: Build AppImage (Qt 6.10.2)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # Ubuntu 22.04 is recommended for modern Qt 6.x
    runs-on: ubuntu-22.04 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # libfuse2 is for the AppImage tool
          # libxcb-cursor0 and libxkbcommon are mandatory for Qt6 apps
          sudo apt-get install -y libfuse2 libglu1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0

      - name: Install Qt 6.10.2
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.10.2'
          # Host is usually determined automatically, but ensures Linux
          host: 'linux'
          target: 'desktop'

      - name: Build Application (QMake)
        run: |
          # 1. Clean and Build
          qmake .
          make -j$(nproc)
          
          # 2. Create a very specific directory structure
          # We use $GITHUB_WORKSPACE to ensure we are using absolute paths
          mkdir -p ${{ github.workspace }}/FinalBuild/Desktop-Release
          
          # 3. Copy the bin folder into the Release folder
          # Your logs show the binary is created in a folder named 'bin'
          cp -r bin ${{ github.workspace }}/FinalBuild/Desktop-Release/
          
          # 4. Verify exactly where the file is (Check logs for this output!)
          echo "VERIFYING PATHS:"
          ls -R ${{ github.workspace }}/FinalBuild

      - name: Qt to AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        uses: Kidev/Qt-AppImage@v1
        with:
          # Use the absolute path here
          install_folder: '${{ github.workspace }}/FinalBuild/Desktop-Release'
          
          # Use single words for now to prevent the 'splitting' bug
          app_name: 'SpaceTimeHeart'
          binary: 'SpaceTimeHeart'
          
          # We will add the comment back once we know the path works
          comment: 'Note-Taking-App' 
          category: 'Utility'

      - name: Qt to AppImage
        env:
          # This fixes the "Failed to load FUSE" error
          APPIMAGE_EXTRACT_AND_RUN: 1
        uses: Kidev/Qt-AppImage@v1
        with:
          # Path to the folder containing the /bin folder
          install_folder: './FinalBuild/Desktop-Release'
          app_name: 'SpaceTimeHeart'
          executable: 'SpaceTimeHeart'
          comment: 'Application for interconnected note taking'
          category: 'Utility'

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: SpaceTimeHeart-AppImage
          path: ./*.AppImage
