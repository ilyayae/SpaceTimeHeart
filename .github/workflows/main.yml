name: Build AppImage (Qt 6.10.2)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # Ubuntu 22.04 is recommended for modern Qt 6.x
    runs-on: ubuntu-22.04 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # libfuse2 is for the AppImage tool
          # libxcb-cursor0 and libxkbcommon are mandatory for Qt6 apps
          sudo apt-get install -y libfuse2 libglu1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0

      - name: Install Qt 6.10.2
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.10.2'
          # Host is usually determined automatically, but ensures Linux
          host: 'linux'
          target: 'desktop'

      - name: Build Application (QMake)
        run: |
          qmake .
          make -j$(nproc)
          mkdir -p FinalBuild/Desktop-Release
          cp -r bin FinalBuild/Desktop-Release/
          chmod +x FinalBuild/Desktop-Release/bin/SpaceTimeHeart

      - name: Qt to AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        uses: Kidev/Qt-AppImage@v1
        with:
          # Point to the folder that CONTAINS the bin folder
          install_folder: './FinalBuild/Desktop-Release'
          app_name: 'SpaceTimeHeart'
          executable: 'SpaceTimeHeart'
          comment: 'Application for interconnected note taking'
          category: 'Utility'

      - name: Qt to AppImage
        env:
          # This fixes the "Failed to load FUSE" error
          APPIMAGE_EXTRACT_AND_RUN: 1
        uses: Kidev/Qt-AppImage@v1
        with:
          # Path to the folder containing the /bin folder
          install_folder: './FinalBuild/Desktop-Release'
          app_name: 'SpaceTimeHeart'
          executable: 'SpaceTimeHeart'
          comment: 'Application for interconnected note taking'
          category: 'Utility'

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: SpaceTimeHeart-AppImage
          path: ./*.AppImage
