name: Build AppImage

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # Basic dependencies for Qt6 and AppImage tools
          sudo apt-get install -y libfuse2 libglu1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 libxcb-shape0 libxcb-xinerama0 libxcb-xinput0 libxcb-render-util0 libxcb-image0

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.1'

      - name: Build Application
        run: |
          qmake .
          make -j$(nproc)
          # We check if 'bin/SpaceTimeHeart' exists
          ls -lh bin/SpaceTimeHeart

      - name: Create AppImage (Native Tooling)
        env:
          # Tell the tool where Qt is
          QT_DPATH: ${{ env.Qt6_DIR }}
          # Bypass FUSE
          APPIMAGE_EXTRACT_AND_RUN: 1
          # Ensure SVG plugins are included
          EXTRA_QT_PLUGINS: "svg;iconengines;imageformats"
        run: |
          # 1. Download linuxdeploy and the Qt plugin
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          # 2. Run linuxdeploy
          # -e: your binary
          # --plugin qt: bundles all Qt dependencies automatically
          # --output appimage: creates the final file
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            -e bin/SpaceTimeHeart \
            --plugin qt \
            --output appimage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: SpaceTimeHeart-AppImage
          path: ./*.AppImage
