name: Build AppImage (Qt 6.10.2)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # Ubuntu 22.04 is recommended for modern Qt 6.x
    runs-on: ubuntu-22.04 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 libglu1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.10.2' # Your chosen Qt version

      - name: Build Application (QMake)
        run: |
          # 1. Clean and Build
          qmake .
          make -j$(nproc)
          
          # 2. Get the Qt installation path dynamically from the runner
          QT_BIN_DIR=$(dirname $(which qmake))
          QT_INSTALL_DIR=$(dirname $QT_BIN_DIR)
          
          # 3. Create the directory structure the AppImage Action requires
          mkdir -p FinalBuild/Desktop-Release/bin
          mkdir -p FinalBuild/Desktop-Release/lib
          mkdir -p FinalBuild/Desktop-Release/plugins
          
          # 4. Copy the binary (according to previous logs it's in the 'bin' folder)
          cp bin/SpaceTimeHeart FinalBuild/Desktop-Release/bin/
          chmod +x FinalBuild/Desktop-Release/bin/SpaceTimeHeart
          
          # 5. Copy the Qt libraries and plugins into your folder
          cp -r $QT_INSTALL_DIR/lib/. FinalBuild/Desktop-Release/lib/ || true
          cp -r $QT_INSTALL_DIR/plugins/. FinalBuild/Desktop-Release/plugins/ || true
          
          # 6. Verify paths in logs
          echo "VERIFYING PATHS:"
          ls FinalBuild/Desktop-Release/

      - name: Qt to AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        uses: Kidev/Qt-AppImage@v1
        with:
          # USE A RELATIVE PATH SO DOCKER CAN FIND IT
          install_folder: 'FinalBuild/Desktop-Release'
          
          app_name: 'SpaceTimeHeart'
          binary: 'SpaceTimeHeart'
          comment: 'Note-Taking-App' 
          category: 'Utility'

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: SpaceTimeHeart-AppImage
          path: ./*.AppImage
