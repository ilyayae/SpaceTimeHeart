name: Build AppImage

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # We use Ubuntu 20.04 because it has better compatibility for AppImages
    runs-on: ubuntu-20.04 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # FIX 1: Install FUSE and Qt dependencies
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 libglu1-mesa-dev

      # FIX 2: Install Qt (Change version to match your local setup)
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0' 

      # FIX 3: You MUST compile the app here so the folder exists
      - name: Compile Application
        run: |
          mkdir build
          cd build
          qmake ..
          make -j$(nproc)
          # Now create the specific structure you wanted
          mkdir -p ../FinalBuild/Desktop-Release/bin
          cp ./SpaceTimeHeart ../FinalBuild/Desktop-Release/bin/

      # Debug: This will print the file structure so you can see if it worked
      - name: Verify Build Path
        run: ls -R FinalBuild/

      - name: Qt to AppImage
        # Bypass FUSE mounting requirement
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        uses: Kidev/Qt-AppImage@v1
        with:
          # Point to the folder containing the /bin folder
          install_folder: './FinalBuild/Desktop-Release'
          app_name: 'SpaceTimeHeart'
          executable: 'SpaceTimeHeart'
          comment: 'Application for interconnected note taking'
          category: 'Utility'

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: SpaceTimeHeart-Binary
          path: ./*.AppImage
